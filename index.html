<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Wasserpistolen-Spiel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b6ff2;
      font-family: system-ui, Segoe UI, Roboto, Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    #ui {
      position: absolute;
      top: 8px;
      left: 55px;
      right: 8px;
      color: white;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
      pointer-events: none;
      z-index: 2;
    }

    #status {
      max-width: 70%;
    }

    #leaderboard {
      text-align: right;
      white-space: pre-line;
    }

    #msg {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      pointer-events: none;
      padding: 20px;
      white-space: pre-line;
      z-index: 5;
    }

    #shop,
    #resultScreen,
    #adminPanel {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
    }

    #shop {
      background: rgba(0,0,0,0.55);
      z-index: 20;
    }

    #resultScreen {
      background: rgba(0,0,0,0.68);
      z-index: 30;
    }

    #adminPanel {
      background: rgba(0,0,0,0.72);
      z-index: 50;
    }

    #shopBox,
    #resultBox,
    #adminBox {
      width: min(560px, 92vw);
      max-height: 86vh;
      overflow-y: auto;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.45);
    }

    #shopBox,
    #resultBox {
      background: #063b8f;
      border: 3px solid white;
    }

    #adminBox {
      background: #111b44;
      border: 3px solid #ffcc00;
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    #shopCoins {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .shopItem {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 14px;
      padding: 12px;
      margin: 10px 0;
    }

    .shopItem strong {
      font-size: 18px;
    }

    .shopItem p {
      margin: 8px 0;
      line-height: 1.4;
    }

    button {
      margin-top: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #ffcc00;
      color: #222;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #888;
      color: #ddd;
      cursor: not-allowed;
    }

    #closeShop,
    #adminClose {
      width: 100%;
      background: #ff3b5c;
      color: white;
      font-size: 16px;
    }

    #continueToShop {
      width: 100%;
      font-size: 18px;
      padding: 12px;
    }

    #resultRank {
      font-size: 23px;
      font-weight: bold;
      margin: 12px 0;
      color: #ffcc00;
      text-align: center;
    }

    #resultLeaderboard {
      white-space: pre-line;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      margin: 12px 0;
      text-align: left;
      line-height: 1.45;
    }

    #adminBox h2 {
      color: #ffcc00;
    }

    #adminBox label {
      display: block;
      margin: 12px 0;
      font-weight: bold;
    }

    #adminBox input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    #adminBox button {
      width: 100%;
    }

    #adminUnlockWeapons {
      background: #00e676;
    }

    #adminLoginMsg {
      color: #ffcc00;
      font-weight: bold;
      text-align: center;
    }

    #adminControls {
      display: none;
    }

    #mobileControls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
      z-index: 15;
      pointer-events: auto;
      padding: 0 8px;
      box-sizing: border-box;
    }

    .mobileBtn {
      min-width: 70px;
      padding: 13px 10px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(255, 204, 0, 0.95);
      color: #222;
      font-weight: 800;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      touch-action: manipulation;
    }

    #shootBtn {
      background: #00e6ff;
    }

    #adminMobileBtn {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 60;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 2px solid white;
      background: rgba(17, 27, 68, 0.92);
      color: #ffcc00;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      touch-action: manipulation;
    }

    @media (max-width: 700px) {
      #ui {
        font-size: 11px;
        left: 56px;
      }

      #leaderboard {
        display: none;
      }

      #status {
        max-width: 100%;
      }

      #msg {
        font-size: 22px;
      }

      .mobileBtn {
        min-width: 62px;
        font-size: 12px;
        padding: 12px 8px;
      }
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>

  <button id="adminMobileBtn">⚙</button>

  <div id="ui">
    <div id="status">Lädt...</div>
    <div id="leaderboard">Rangliste</div>
  </div>

  <div id="msg"></div>

  <div id="mobileControls">
    <button class="mobileBtn" id="shootBtn">Schießen</button>
    <button class="mobileBtn" id="shopBtn">Shop</button>
    <button class="mobileBtn" id="nameBtn">Name</button>
    <button class="mobileBtn" id="restartBtn">Neustart</button>
  </div>

  <div id="resultScreen">
    <div id="resultBox">
      <h2>Game Over</h2>
      <div id="resultRank"></div>
      <div id="resultLeaderboard"></div>
      <button id="continueToShop">Weiter zum Shop</button>
    </div>
  </div>

  <div id="shop">
    <div id="shopBox">
      <h2>Waffen-Shop</h2>
      <p id="shopCoins">Münzen: 0</p>
      <div id="shopItems"></div>
      <button id="closeShop">Shop schließen</button>
    </div>
  </div>

  <div id="adminPanel">
    <div id="adminBox">
      <h2>Admin-Panel</h2>

      <div id="adminLogin">
        <p>Admin-Code eingeben:</p>
        <input id="adminCodeInput" type="password" placeholder="Admin-Code" />
        <button id="adminLoginBtn">Einloggen</button>
        <p id="adminLoginMsg"></p>
      </div>

      <div id="adminControls">
        <p><strong>Admin aktiv</strong></p>

        <label>
          Zielscheiben-Grundgeschwindigkeit:
          <input id="adminTargetSpeed" type="number" min="20" max="1000" />
        </label>

        <label>
          Geschwindigkeit pro Level:
          <input id="adminSpeedPerLevel" type="number" min="0" max="300" />
        </label>

        <label>
          Trophäen pro Zielscheibe:
          <input id="adminTrophiesPerTarget" type="number" min="0" max="1000" />
        </label>

        <button id="adminSaveSettings">Einstellungen speichern</button>
        <button id="adminUnlockWeapons">Alle Waffen kostenlos freischalten</button>
        <button id="adminClose">Admin-Panel schließen</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const statusEl = document.getElementById("status");
    const leaderboardEl = document.getElementById("leaderboard");
    const msgEl = document.getElementById("msg");

    const shopEl = document.getElementById("shop");
    const shopItemsEl = document.getElementById("shopItems");
    const shopCoinsEl = document.getElementById("shopCoins");
    const closeShopBtn = document.getElementById("closeShop");

    const resultScreenEl = document.getElementById("resultScreen");
    const resultRankEl = document.getElementById("resultRank");
    const resultLeaderboardEl = document.getElementById("resultLeaderboard");
    const continueToShopBtn = document.getElementById("continueToShop");

    const adminPanelEl = document.getElementById("adminPanel");
    const adminLoginEl = document.getElementById("adminLogin");
    const adminControlsEl = document.getElementById("adminControls");
    const adminCodeInputEl = document.getElementById("adminCodeInput");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminLoginMsgEl = document.getElementById("adminLoginMsg");

    const adminTargetSpeedEl = document.getElementById("adminTargetSpeed");
    const adminSpeedPerLevelEl = document.getElementById("adminSpeedPerLevel");
    const adminTrophiesPerTargetEl = document.getElementById("adminTrophiesPerTarget");

    const adminSaveSettingsBtn = document.getElementById("adminSaveSettings");
    const adminUnlockWeaponsBtn = document.getElementById("adminUnlockWeapons");
    const adminCloseBtn = document.getElementById("adminClose");

    const shootBtn = document.getElementById("shootBtn");
    const shopBtn = document.getElementById("shopBtn");
    const nameBtn = document.getElementById("nameBtn");
    const restartBtn = document.getElementById("restartBtn");
    const adminMobileBtn = document.getElementById("adminMobileBtn");

    const ADMIN_CODE = "Fcb";

    // ---- Online-Rangliste (jsonbin.io) ----
    const BIN_ID = "6a330b3af5f4af5e29048bdf";
    const ACCESS_KEY = "$2a$10$6p/Jg.50A26s6qA4bM8Ia.ypxQ9I64QlrlzbnSCgOvzPd51.eDWd.";
    const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
    let leaderboardData = [];

    const weapons = [
      {
        id: "basic",
        name: "Starter-Wasserpistole",
        price: 0,
        bulletRadius: 22,
        bulletSpeed: 760,
        cooldown: 0.16,
        color: "rgba(120,230,255,0.85)",
        image: "bilder/pistole1.png"
      },
      {
        id: "pistol1",
        name: "Turbo-Pistole",
        price: 500,
        bulletRadius: 18,
        bulletSpeed: 950,
        cooldown: 0.11,
        color: "rgba(0,255,180,0.9)",
        image: "bilder/pistole1.png"
      },
      {
        id: "pistol2",
        name: "Mega-Spritzer",
        price: 1000,
        bulletRadius: 30,
        bulletSpeed: 820,
        cooldown: 0.17,
        color: "rgba(80,200,255,0.95)",
        image: "bilder/pistole2.png"
      },
      {
        id: "pistol3",
        name: "Blauer Blitz",
        price: 1500,
        bulletRadius: 16,
        bulletSpeed: 1200,
        cooldown: 0.09,
        color: "rgba(80,150,255,0.95)",
        image: "bilder/pistole3.png"
      },
      {
        id: "pistol4",
        name: "Gold-Pistole",
        price: 2000,
        bulletRadius: 25,
        bulletSpeed: 1050,
        cooldown: 0.10,
        color: "rgba(255,215,0,0.95)",
        image: "bilder/pistole4.png"
      },
      {
        id: "pistol5",
        name: "Doppel-Spritzer",
        price: 2500,
        bulletRadius: 28,
        bulletSpeed: 1000,
        cooldown: 0.08,
        color: "rgba(255,80,255,0.95)",
        image: "bilder/pistole1.png"
      },
      {
        id: "pistol6",
        name: "Eis-Wasserpistole",
        price: 3000,
        bulletRadius: 24,
        bulletSpeed: 1150,
        cooldown: 0.085,
        color: "rgba(180,240,255,0.95)",
        image: "bilder/pistole2.png"
      },
      {
        id: "pistol7",
        name: "Feuer-Wasserpistole",
        price: 3500,
        bulletRadius: 32,
        bulletSpeed: 980,
        cooldown: 0.095,
        color: "rgba(255,120,40,0.95)",
        image: "bilder/pistole3.png"
      },
      {
        id: "pistol8",
        name: "Regenbogen-Pistole",
        price: 4000,
        bulletRadius: 30,
        bulletSpeed: 1250,
        cooldown: 0.075,
        color: "rgba(255,90,255,0.98)",
        image: "bilder/pistole4.png"
      },
      {
        id: "pistol9",
        name: "Power-Kanone",
        price: 4500,
        bulletRadius: 40,
        bulletSpeed: 900,
        cooldown: 0.14,
        color: "rgba(255,255,255,0.95)",
        image: "bilder/pistole1.png"
      },
      {
        id: "pistol10",
        name: "Ultra-Wasserpistole",
        price: 10000,
        bulletRadius: 36,
        bulletSpeed: 1400,
        cooldown: 0.06,
        color: "rgba(0,255,255,0.98)",
        image: "bilder/pistole4.png"
      }
    ];

    // Designs für die gezeichneten Wasserpistolen (alle zeigen nach oben).
    // Passend zu den Shop-Namen: Farbe + Spezialeffekt an der Mündung.
    const weaponThemes = {
      basic:    { body: "#2bb6e6", accent: "#eaf9ff", tank: "#9be7ff", style: "normal" },
      pistol1:  { body: "#13c46a", accent: "#d6ffe9", tank: "#0e9e54", style: "turbo" },
      pistol2:  { body: "#2a7de1", accent: "#d7e9ff", tank: "#1b5bb0", style: "mega" },
      pistol3:  { body: "#2f6bff", accent: "#cdd9ff", tank: "#1740c0", style: "blitz" },
      pistol4:  { body: "#f4c430", accent: "#fff6c2", tank: "#c99700", style: "gold" },
      pistol5:  { body: "#e64bd6", accent: "#ffd9f7", tank: "#b21fa3", style: "double" },
      pistol6:  { body: "#7fdcff", accent: "#ffffff", tank: "#39b8e6", style: "ice" },
      pistol7:  { body: "#ff6a2b", accent: "#ffd9a8", tank: "#d6431a", style: "fire" },
      pistol8:  { body: "#ff5ad6", accent: "#ffffff", tank: "#9b5bff", style: "rainbow" },
      pistol9:  { body: "#e9eef5", accent: "#ffffff", tank: "#b7c2d0", style: "power" },
      pistol10: { body: "#19f0ff", accent: "#eaffff", tank: "#0bb6cf", style: "ultra" }
    };

    function loadOwnedWeapons() {
      try {
        return JSON.parse(localStorage.getItem("ownedWeapons")) || ["basic"];
      } catch {
        return ["basic"];
      }
    }

    const player = {
      x: 0,
      y: 0,
      drawW: 190,
      drawH: 95,
      speed: 380,
      cooldown: 0,
      left: false,
      right: false
    };

    const state = {
      level: 1,
      maxLevel: 10,
      lives: 5,
      hits: 0,
      requiredHits: 10,
      timeLeft: 25,
      lastT: performance.now(),
      messageTimer: 0,
      finished: false,

      coins: Number(localStorage.getItem("coins") || 0),
      trophies: Number(localStorage.getItem("trophies") || 0),
      score: 0,
      playerName: localStorage.getItem("playerName") || "Spieler",
      isAdmin: false,

      ownedWeapons: loadOwnedWeapons(),
      equippedWeapon: localStorage.getItem("equippedWeapon") || "basic"
    };

    if (!state.ownedWeapons.includes("basic")) {
      state.ownedWeapons.push("basic");
    }

    const config = {
      levelTime: 25,
      baseTargetSpeed: 120,
      speedPerLevel: 38,
      targetRadius: 52,
      maxTargetsOnScreen: 5,
      baseSpawnMs: 950,
      spawnDecPerLevel: 60,
      minSpawnMs: 340,
      coinsPerLevel: 50,
      coinsPerTarget: 10
    };

    const adminSettings = {
      targetSpeed: Number(localStorage.getItem("adminTargetSpeed") || config.baseTargetSpeed),
      speedPerLevel: Number(localStorage.getItem("adminSpeedPerLevel") || config.speedPerLevel),
      trophiesPerTarget: Number(localStorage.getItem("adminTrophiesPerTarget") || 1)
    };

    const bullets = [];
    const targets = [];
    const explosions = [];

    let spawnTimer = 0;
    let scoreSaved = false;
    let lastRank = null;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;

      player.y = canvas.height - 95;
      player.x = clamp(player.x || canvas.width / 2, 45, canvas.width - 45);

      const base = Math.max(130, Math.min(230, canvas.width * 0.25));
      player.drawW = base;
      player.drawH = base * 0.52;
    }

    addEventListener("resize", resize, { passive: true });
    resize();

    addEventListener("pointermove", (e) => {
      if (state.finished) return;
      if (shopEl.style.display === "flex") return;
      if (resultScreenEl.style.display === "flex") return;
      if (adminPanelEl.style.display === "flex") return;

      const rect = canvas.getBoundingClientRect();
      const px = (e.clientX - rect.left) * (canvas.width / rect.width);
      player.x = clamp(px, 45, canvas.width - 45);
    }, { passive: true });

    addEventListener("pointerdown", (e) => {
      if (e.target.tagName === "BUTTON") return;
      if (shopEl.style.display === "flex") return;
      if (resultScreenEl.style.display === "flex") return;
      if (adminPanelEl.style.display === "flex") return;

      shoot();
    });

    addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === "KeyA") {
        openAdminPanel();
        e.preventDefault();
      }

      if (e.code === "ArrowLeft") {
        player.left = true;
      }

      if (e.code === "ArrowRight") {
        player.right = true;
      }

      if (e.code === "Space") {
        shoot();
        e.preventDefault();
      }

      if (e.code === "KeyR") {
        restartGame();
      }

      if (e.code === "KeyN") {
        changeName();
      }

      if (e.code === "KeyS") {
        toggleShop();
      }
    });

    addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") {
        player.left = false;
      }

      if (e.code === "ArrowRight") {
        player.right = false;
      }
    });

    shootBtn.onclick = shoot;
    shopBtn.onclick = toggleShop;
    nameBtn.onclick = changeName;
    restartBtn.onclick = restartGame;
    adminMobileBtn.onclick = openAdminPanel;

    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSquirt() {
      try {
        ensureAudio();

        const t0 = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(1500, t0);
        osc.frequency.exponentialRampToValueAtTime(850, t0 + 0.08);

        gain.gain.setValueAtTime(0.17, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.09);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.09);
      } catch {}
    }

    function playHit() {
      try {
        ensureAudio();

        const t0 = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(750, t0);
        osc.frequency.exponentialRampToValueAtTime(430, t0 + 0.13);

        gain.gain.setValueAtTime(0.25, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.14);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.14);
      } catch {}
    }

    function getCurrentWeapon() {
      return weapons.find(w => w.id === state.equippedWeapon) || weapons[0];
    }

    function saveWeapons() {
      localStorage.setItem("ownedWeapons", JSON.stringify(state.ownedWeapons));
      localStorage.setItem("equippedWeapon", state.equippedWeapon);
    }

    function toggleShop() {
      if (shopEl.style.display === "flex") {
        closeShop();
      } else {
        openShop();
      }
    }

    function openShop() {
      shopEl.style.display = "flex";
      renderShop();
    }

    function closeShop() {
      shopEl.style.display = "none";
    }

    function renderShop() {
      shopCoinsEl.textContent = "Münzen: " + state.coins;
      shopItemsEl.innerHTML = "";

      for (const weapon of weapons) {
        const owned = state.ownedWeapons.includes(weapon.id);
        const equipped = state.equippedWeapon === weapon.id;

        const item = document.createElement("div");
        item.className = "shopItem";

        const title = document.createElement("strong");
        title.textContent = weapon.name;
        item.appendChild(title);

        const info = document.createElement("p");
        info.innerHTML =
          "Preis: " + weapon.price + " Münzen<br>" +
          "Schussgröße: " + weapon.bulletRadius + "<br>" +
          "Schussgeschwindigkeit: " + weapon.bulletSpeed + "<br>" +
          "Schuss-Abklingzeit: " + weapon.cooldown + " s";
        item.appendChild(info);

        const button = document.createElement("button");

        if (equipped) {
          button.textContent = "Ausgerüstet";
          button.disabled = true;
        } else if (owned) {
          button.textContent = "Ausrüsten";
          button.onclick = () => {
            state.equippedWeapon = weapon.id;
            saveWeapons();
            renderShop();
            updateLeaderboard();
          };
        } else {
          button.textContent = "Kaufen";
          button.disabled = state.coins < weapon.price;

          button.onclick = () => {
            buyWeapon(weapon.id);
          };
        }

        item.appendChild(button);
        shopItemsEl.appendChild(item);
      }
    }

    function buyWeapon(weaponId) {
      const weapon = weapons.find(w => w.id === weaponId);

      if (!weapon) return;
      if (state.ownedWeapons.includes(weapon.id)) return;

      if (state.coins >= weapon.price) {
        state.coins -= weapon.price;
        state.ownedWeapons.push(weapon.id);
        state.equippedWeapon = weapon.id;

        localStorage.setItem("coins", String(state.coins));
        saveWeapons();

        showMessage(weapon.name + "\ngekauft und ausgerüstet!", 1.5);
        renderShop();
        updateLeaderboard();
      } else {
        showMessage("Nicht genug Münzen!", 1.2);
      }
    }

    function openAdminPanel() {
      adminPanelEl.style.display = "flex";

      if (state.isAdmin) {
        showAdminControls();
      } else {
        adminLoginEl.style.display = "block";
        adminControlsEl.style.display = "none";
        adminCodeInputEl.value = "";
        adminLoginMsgEl.textContent = "";
      }
    }

    function closeAdminPanel() {
      adminPanelEl.style.display = "none";
    }

    function showAdminControls() {
      adminLoginEl.style.display = "none";
      adminControlsEl.style.display = "block";

      adminTargetSpeedEl.value = adminSettings.targetSpeed;
      adminSpeedPerLevelEl.value = adminSettings.speedPerLevel;
      adminTrophiesPerTargetEl.value = adminSettings.trophiesPerTarget;
    }

    function adminLogin() {
      const code = adminCodeInputEl.value;

      if (code === ADMIN_CODE) {
        state.isAdmin = true;
        adminLoginMsgEl.textContent = "Admin aktiviert!";
        showAdminControls();
      } else {
        adminLoginMsgEl.textContent = "Falscher Admin-Code!";
      }
    }

    function saveAdminSettings() {
      if (!state.isAdmin) return;

      adminSettings.targetSpeed = Number(adminTargetSpeedEl.value);
      adminSettings.speedPerLevel = Number(adminSpeedPerLevelEl.value);
      adminSettings.trophiesPerTarget = Number(adminTrophiesPerTargetEl.value);

      localStorage.setItem("adminTargetSpeed", String(adminSettings.targetSpeed));
      localStorage.setItem("adminSpeedPerLevel", String(adminSettings.speedPerLevel));
      localStorage.setItem("adminTrophiesPerTarget", String(adminSettings.trophiesPerTarget));

      showMessage("Admin-Einstellungen gespeichert!", 1.5);
      updateLeaderboard();
    }

    function adminUnlockAllWeapons() {
      if (!state.isAdmin) return;

      state.ownedWeapons = weapons.map(weapon => weapon.id);
      state.equippedWeapon = weapons[weapons.length - 1].id;

      saveWeapons();
      renderShop();
      updateLeaderboard();

      showMessage("Alle Waffen wurden kostenlos freigeschaltet!", 1.8);
    }

    closeShopBtn.onclick = closeShop;

    continueToShopBtn.onclick = () => {
      resultScreenEl.style.display = "none";
      openShop();
    };

    adminLoginBtn.onclick = adminLogin;
    adminSaveSettingsBtn.onclick = saveAdminSettings;
    adminUnlockWeaponsBtn.onclick = adminUnlockAllWeapons;
    adminCloseBtn.onclick = closeAdminPanel;

    function shoot() {
      if (state.finished) return;
      if (shopEl.style.display === "flex") return;
      if (resultScreenEl.style.display === "flex") return;
      if (adminPanelEl.style.display === "flex") return;
      if (player.cooldown > 0) return;

      const weapon = getCurrentWeapon();

      bullets.push({
        x: player.x,
        y: player.y - (player.muzzleOffset || 45),
        r: weapon.bulletRadius,
        vy: -weapon.bulletSpeed,
        color: weapon.color
      });

      player.cooldown = weapon.cooldown;
      playSquirt();
    }

    function spawnTarget() {
      if (targets.length >= config.maxTargetsOnScreen) return;

      const r = config.targetRadius;

      targets.push({
        x: rand(r, canvas.width - r),
        y: -r,
        r,
        vy: adminSettings.targetSpeed + state.level * adminSettings.speedPerLevel,
        wobble: rand(0, Math.PI * 2),
        color: randomColor()
      });
    }

    function update(dt) {
      if (state.finished) return;
      if (shopEl.style.display === "flex") return;
      if (resultScreenEl.style.display === "flex") return;
      if (adminPanelEl.style.display === "flex") return;

      state.timeLeft -= dt;

      if (state.timeLeft <= 0) {
        loseLife();
      }

      if (player.left) {
        player.x -= player.speed * dt;
      }

      if (player.right) {
        player.x += player.speed * dt;
      }

      player.x = clamp(player.x, 45, canvas.width - 45);
      player.cooldown = Math.max(0, player.cooldown - dt);

      const spawnMs = Math.max(
        config.minSpawnMs,
        config.baseSpawnMs - state.level * config.spawnDecPerLevel
      );

      spawnTimer += dt * 1000;

      if (spawnTimer >= spawnMs) {
        spawnTimer = 0;
        spawnTarget();
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y += b.vy * dt;

        if (b.y < -80) {
          bullets.splice(i, 1);
        }
      }

      for (let i = targets.length - 1; i >= 0; i--) {
        const t = targets[i];

        t.wobble += dt * 4;
        t.y += t.vy * dt;
        t.x += Math.sin(t.wobble) * 45 * dt;

        if (t.y - t.r > canvas.height) {
          targets.splice(i, 1);
          loseLife();
        }
      }

      checkCollisions();

      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].time -= dt;

        if (explosions[i].time <= 0) {
          explosions.splice(i, 1);
        }
      }

      if (state.messageTimer > 0) {
        state.messageTimer -= dt;

        if (state.messageTimer <= 0 && !state.finished) {
          msgEl.style.display = "none";
        }
      }
    }

    function checkCollisions() {
      for (let i = targets.length - 1; i >= 0; i--) {
        const t = targets[i];

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];

          const dx = t.x - b.x;
          const dy = t.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < t.r + b.r) {
            targets.splice(i, 1);
            bullets.splice(j, 1);

            state.hits++;
            state.score += 10 * state.level;

            state.coins += config.coinsPerTarget;
            localStorage.setItem("coins", String(state.coins));

            state.trophies += adminSettings.trophiesPerTarget;
            localStorage.setItem("trophies", String(state.trophies));

            explosions.push({
              x: t.x,
              y: t.y,
              time: 0.35,
              color: t.color
            });

            playHit();

            if (state.hits >= state.requiredHits) {
              completeLevel();
            }

            break;
          }
        }
      }
    }

    function completeLevel() {
      state.coins += config.coinsPerLevel;
      state.score += config.coinsPerLevel;

      localStorage.setItem("coins", String(state.coins));

      bullets.length = 0;
      targets.length = 0;

      showMessage(
        "Level " + state.level + " geschafft!\n+" + config.coinsPerLevel + " Münzen",
        1.5
      );

      if (state.level >= state.maxLevel) {
        winGame();
        return;
      }

      state.level++;
      state.hits = 0;
      state.requiredHits = 10 + Math.floor(state.level / 2);
      state.timeLeft = config.levelTime;
    }

    function loseLife() {
      state.lives--;

      bullets.length = 0;
      targets.length = 0;
      state.timeLeft = config.levelTime;

      if (state.lives <= 0) {
        gameOver();
        return;
      }

      showMessage("Leben verloren!\nNoch " + state.lives + " Leben", 1.2);
    }

    function winGame() {
      state.finished = true;

      showMessage("Gewonnen!\nSpeichere Rangliste ...", 999);

      saveScore().then(rank => {
        showMessage(
          "Gewonnen!\nScore: " + state.score +
          "\nDu bist auf Platz " + rank +
          "\nMünzen: " + state.coins +
          "\nTrophäen: " + state.trophies +
          "\n\nNeustart-Button drücken",
          999
        );
      });
    }

    function gameOver() {
      state.finished = true;

      saveScore().then(rank => openResultScreen(rank));
    }

    async function saveScore() {
      if (scoreSaved) return lastRank;

      scoreSaved = true;

      // Aktuelle Online-Rangliste holen, damit der Platz auch im Vergleich
      // zu anderen Spielern stimmt.
      await fetchLeaderboard();

      const entry = {
        id: Date.now() + "_" + Math.random(),
        name: state.playerName,
        score: state.score,
        level: state.level,
        coins: state.coins,
        trophies: state.trophies
      };

      leaderboardData.push(entry);
      leaderboardData.sort((a, b) => b.score - a.score);

      lastRank = leaderboardData.findIndex(item => item.id === entry.id) + 1;

      leaderboardData = leaderboardData.slice(0, 10);

      await putLeaderboard();
      updateLeaderboard();

      return lastRank;
    }

    function openResultScreen(rank) {
      msgEl.style.display = "none";

      const list = getLeaderboard();

      resultRankEl.textContent = "Du bist auf Platz " + rank + "!";

      let text = "Rangliste:\n\n";

      if (list.length === 0) {
        text += "Noch keine Einträge";
      } else {
        for (let i = 0; i < list.length; i++) {
          text += (i + 1) + ". " + list[i].name + " - " + list[i].score + " Punkte\n";
        }
      }

      text += "\nDein Score: " + state.score;
      text += "\nDein erreichtes Level: " + state.level;
      text += "\nDeine Münzen: " + state.coins;
      text += "\nDeine Trophäen: " + state.trophies;
      text += "\n\nKlicke auf Weiter, um zum Shop zu gehen.";

      resultLeaderboardEl.textContent = text;

      resultScreenEl.style.display = "flex";
    }

    function getLeaderboard() {
      return leaderboardData;
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(BIN_URL + "/latest", {
          headers: { "X-Access-Key": ACCESS_KEY }
        });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        const rec = data.record;

        if (Array.isArray(rec)) {
          leaderboardData = rec;
        } else if (rec && Array.isArray(rec.leaderboard)) {
          leaderboardData = rec.leaderboard;
        } else {
          leaderboardData = [];
        }
      } catch (e) {
        console.warn("Rangliste konnte nicht geladen werden:", e);
      }

      leaderboardData.sort((a, b) => b.score - a.score);
      return leaderboardData;
    }

    async function putLeaderboard() {
      try {
        const res = await fetch(BIN_URL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Key": ACCESS_KEY,
            "X-Bin-Versioning": "false"
          },
          body: JSON.stringify(leaderboardData)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
      } catch (e) {
        console.warn("Rangliste konnte nicht gespeichert werden:", e);
      }
    }

    function updateLeaderboard() {
      const list = getLeaderboard();

      let text = "";
      text += "Spieler: " + state.playerName + "\n";
      text += "Münzen: " + state.coins + "\n";
      text += "Trophäen: " + state.trophies + "\n";
      text += "Waffe: " + getCurrentWeapon().name + "\n\n";
      text += "Rangliste:\n";

      if (list.length === 0) {
        text += "Noch keine Einträge\n";
      } else {
        for (let i = 0; i < list.length; i++) {
          text += (i + 1) + ". " + list[i].name + " - " + list[i].score + "\n";
        }
      }

      leaderboardEl.textContent = text;
    }

    function changeName() {
      const name = prompt("Gib einen Spielernamen ein:", state.playerName);

      if (name && name.trim() !== "") {
        state.playerName = name.trim().slice(0, 14);
        localStorage.setItem("playerName", state.playerName);
        updateLeaderboard();
      }
    }

    function restartGame() {
      state.level = 1;
      state.lives = 5;
      state.hits = 0;
      state.requiredHits = 10;
      state.timeLeft = config.levelTime;
      state.score = 0;
      state.finished = false;
      state.messageTimer = 0;

      scoreSaved = false;
      lastRank = null;
      spawnTimer = 0;

      bullets.length = 0;
      targets.length = 0;
      explosions.length = 0;

      msgEl.style.display = "none";
      resultScreenEl.style.display = "none";
      shopEl.style.display = "none";
      adminPanelEl.style.display = "none";

      state.lastT = performance.now();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground();
      drawTargets();
      drawBullets();
      drawPlayer();
      drawExplosions();

      statusEl.textContent =
        "Level " + state.level + "/" + state.maxLevel +
        " | Treffer " + state.hits + "/" + state.requiredHits +
        " | Leben " + state.lives +
        " | Zeit " + Math.max(0, state.timeLeft).toFixed(1) + " s" +
        " | Score " + state.score +
        " | Münzen " + state.coins +
        " | Waffe: " + getCurrentWeapon().name;
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#37b7ff");
      gradient.addColorStop(1, "#0865d9");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.18)";

      for (let i = 0; i < 12; i++) {
        const x = (i * 170 + performance.now() * 0.025) % (canvas.width + 200) - 100;
        const y = 80 + (i % 4) * 90;

        ctx.beginPath();
        ctx.arc(x, y, 28, 0, Math.PI * 2);
        ctx.arc(x + 32, y + 8, 22, 0, Math.PI * 2);
        ctx.arc(x - 32, y + 10, 20, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPlayer() {
      const weapon = getCurrentWeapon();
      const theme = weaponThemes[weapon.id] || weaponThemes.basic;

      // Größe der Pistole – hoch statt breit, damit sie nach oben zeigt.
      const gw = clamp(canvas.width * 0.10, 58, 104);
      const gh = gw * 1.75;

      // Wasser kommt aus der Mündung (oben).
      player.muzzleOffset = gh;

      ctx.save();
      ctx.translate(player.x, player.y);
      drawWaterGun(theme, gw, gh);
      ctx.restore();
    }

    // Zeichnet eine senkrechte, nach oben zeigende Wasserpistole.
    // Ursprung (0,0) liegt unten an der Pistole; nach oben = negatives y.
    function drawWaterGun(theme, gw, gh) {
      const style = theme.style;

      if (style === "ultra") {
        ctx.shadowColor = theme.body;
        ctx.shadowBlur = 22;
      }

      const wide = style === "power" ? 1.18 : 1;
      const bw = gw * wide;
      const barrelW = gw * 0.34 * (style === "power" ? 1.25 : 1);

      // Lauf / Läufe
      ctx.fillStyle = theme.accent;
      if (style === "double") {
        roundRect(ctx, -barrelW * 0.95, -gh, barrelW * 0.7, gh * 0.5, barrelW * 0.3);
        ctx.fill();
        roundRect(ctx, barrelW * 0.25, -gh, barrelW * 0.7, gh * 0.5, barrelW * 0.3);
        ctx.fill();
      } else {
        roundRect(ctx, -barrelW / 2, -gh, barrelW, gh * 0.5, barrelW * 0.4);
        ctx.fill();
      }

      // Mündungsring
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      roundRect(ctx, -barrelW / 2 - 2, -gh, barrelW + 4, gh * 0.05, 4);
      ctx.fill();

      // Körper / Tank
      if (style === "rainbow") {
        const g = ctx.createLinearGradient(-bw / 2, 0, bw / 2, 0);
        g.addColorStop(0, "#ff3b3b");
        g.addColorStop(0.2, "#ff9e00");
        g.addColorStop(0.4, "#ffe600");
        g.addColorStop(0.6, "#27d36b");
        g.addColorStop(0.8, "#2f7bff");
        g.addColorStop(1, "#a64bff");
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = theme.body;
      }
      roundRect(ctx, -bw / 2, -gh * 0.62, bw, gh * 0.5, gw * 0.22);
      ctx.fill();

      // Tank-Fenster
      const tankR = gw * (style === "mega" ? 0.2 : 0.16);
      ctx.fillStyle = theme.tank;
      ctx.beginPath();
      ctx.arc(-bw * 0.12, -gh * 0.4, tankR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.beginPath();
      ctx.arc(-bw * 0.16, -gh * 0.44, tankR * 0.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Griff
      ctx.fillStyle = theme.body;
      ctx.save();
      ctx.translate(gw * 0.1, -gh * 0.16);
      ctx.rotate(0.3);
      roundRect(ctx, -gw * 0.13, 0, gw * 0.26, gh * 0.34, gw * 0.1);
      ctx.fill();
      ctx.restore();

      // Abzugsbügel
      ctx.strokeStyle = theme.body;
      ctx.lineWidth = gw * 0.05;
      ctx.beginPath();
      ctx.arc(0, -gh * 0.1, gw * 0.12, 0.15, Math.PI * 0.9);
      ctx.stroke();

      // Effekte an der Mündung passend zum Namen
      const topY = -gh;
      if (style === "fire") {
        drawFlames(0, topY, gw);
      } else if (style === "ice") {
        drawIce(0, topY, gw);
      } else if (style === "gold") {
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        roundRect(ctx, -bw * 0.36, -gh * 0.58, bw * 0.12, gh * 0.4, gw * 0.05);
        ctx.fill();
      } else if (style === "blitz") {
        ctx.fillStyle = "#fff7a8";
        ctx.beginPath();
        ctx.moveTo(bw * 0.12, -gh * 0.5);
        ctx.lineTo(bw * 0.0, -gh * 0.34);
        ctx.lineTo(bw * 0.1, -gh * 0.34);
        ctx.lineTo(-bw * 0.04, -gh * 0.16);
        ctx.lineTo(bw * 0.16, -gh * 0.38);
        ctx.lineTo(bw * 0.06, -gh * 0.38);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawFlames(cx, topY, gw) {
      const cols = ["#ffd200", "#ff7b00", "#ff2d00"];
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = cols[i];
        const w = gw * (0.26 - i * 0.06);
        const h = gw * (0.55 - i * 0.12);
        ctx.beginPath();
        ctx.moveTo(cx - w, topY);
        ctx.quadraticCurveTo(cx - w * 0.2, topY - h * 0.6, cx, topY - h);
        ctx.quadraticCurveTo(cx + w * 0.2, topY - h * 0.6, cx + w, topY);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawIce(cx, topY, gw) {
      ctx.fillStyle = "#bff0ff";
      for (let i = -1; i <= 1; i++) {
        const x = cx + i * gw * 0.18;
        const h = gw * (i === 0 ? 0.45 : 0.28);
        ctx.beginPath();
        ctx.moveTo(x, topY - h);
        ctx.lineTo(x - gw * 0.08, topY);
        ctx.lineTo(x + gw * 0.08, topY);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath();
      ctx.arc(cx, topY - gw * 0.2, gw * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.fillStyle = b.color || "rgba(120,230,255,0.85)";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    function drawTargets() {
      for (const t of targets) {
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 0.65, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawExplosions() {
      for (const e of explosions) {
        const p = e.time / 0.35;
        const r = (1 - p) * 80;

        ctx.fillStyle = "rgba(255,255,255," + p + ")";
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = e.color;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r * 1.2, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function showMessage(text, seconds) {
      msgEl.textContent = text;
      msgEl.style.display = "flex";
      state.messageTimer = seconds;
    }

    function randomColor() {
      const colors = ["#ff3b5c", "#ffcc00", "#00e676", "#ff7b00", "#b84dff"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function loop(t) {
      const dt = Math.min(0.033, (t - state.lastT) / 1000);
      state.lastT = t;

      update(dt);
      draw();
      updateLeaderboard();

      requestAnimationFrame(loop);
    }

    updateLeaderboard();

    // Rangliste vom Server laden.
    fetchLeaderboard().then(updateLeaderboard);

    showMessage(
      "Wasserpistolen-Spiel\nHandy: Finger bewegen + Schießen-Button\n10 Münzen pro Ziel\n50 Münzen pro Level",
      3
    );

    requestAnimationFrame(loop);
  })();
  </script>
</body>
